<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Suku Cadang Honda Cengkareng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 font-sans">

    <header class="bg-red-600 text-white py-10 shadow-lg">
        <div class="container mx-auto px-4 text-center">
            <h1 class="text-3xl md:text-4xl font-bold mb-2">Katalog Suku Cadang Honda</h1>
            <p class="opacity-90">Temukan suku cadang resmi berdasarkan tipe dan kode motor Anda</p>
        </div>
    </header>

    <main class="container mx-auto px-4 -mt-8">
        <div class="bg-white rounded-xl shadow-md p-6 mb-8">
            <div class="flex flex-col md:flex-row gap-4 items-center">
                <div class="relative flex-1 w-full">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                        <i class="fas fa-search"></i>
                    </span>
                    <input type="text" id="searchInput" 
                        class="block w-full pl-10 pr-3 py-3 border border-gray-200 rounded-lg focus:ring-red-500 focus:border-red-500 text-sm" 
                        placeholder="Cari motor atau kode (contoh: Vario, K81, PCX)...">
                </div>
                <div class="flex gap-2 w-full md:w-auto overflow-x-auto pb-2 md:pb-0">
                    <button onclick="filterCategory('all')" class="cat-btn active px-5 py-2 rounded-full text-sm font-medium bg-red-600 text-white">Semua</button>
                    <button onclick="filterCategory('Bebek')" class="cat-btn px-5 py-2 rounded-full text-sm font-medium bg-gray-100 text-gray-600 hover:bg-gray-200">Bebek</button>
                    <button onclick="filterCategory('Matic')" class="cat-btn px-5 py-2 rounded-full text-sm font-medium bg-gray-100 text-gray-600 hover:bg-gray-200">Matic</button>
                    <button onclick="filterCategory('Sport')" class="cat-btn px-5 py-2 rounded-full text-sm font-medium bg-gray-100 text-gray-600 hover:bg-gray-200">Sport</button>
                </div>
            </div>
        </div>

        <div id="catalogGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 mb-12">
            </div>

        <div id="noResults" class="hidden text-center py-20 text-gray-500">
            <i class="fas fa-motorcycle text-5xl mb-4 opacity-20"></i>
            <p>Motor yang Anda cari tidak ditemukan.</p>
        </div>
    </main>

    <footer class="bg-gray-800 text-white py-8 mt-auto">
        <div class="container mx-auto px-4 text-center text-sm opacity-70">
            &copy; 2026 Katalog Part Honda. Data bersumber dari Honda Cengkareng.
        </div>
    </footer>

    <script>
        // Data hasil ekstraksi dari HTML mentah Anda
        const motors = [
            // BEBEK
            { name: "Honda WIN", code: "GF6", year: "1984 – 2005", cat: "Bebek" },
            { name: "Honda Grand", code: "GN5", year: "1991 – 1998", cat: "Bebek" },
            { name: "Honda Karisma", code: "KPH", year: "2002 – 2005", cat: "Bebek" },
            { name: "Honda Revo FI", code: "K03", year: "2014 – Sekarang", cat: "Bebek" },
            { name: "Honda Supra X 125 FI", code: "K41", year: "2014 – Sekarang", cat: "Bebek" },
            { name: "Honda CT125 Hunter Cub", code: "K2E", year: "2020 – Sekarang", cat: "Bebek" },
            // MATIC
            { name: "Honda BeAT", code: "KVY", year: "2008 – 2012", cat: "Matic" },
            { name: "Honda BeAT eSP", code: "K81", year: "2016 – 2019", cat: "Matic" },
            { name: "Honda New BeAT K1AL", code: "K1AL", year: "2024 – Sekarang", cat: "Matic" },
            { name: "Honda Genio", code: "K0JN", year: "2022 – 2025", cat: "Matic" },
            { name: "Honda Vario 125", code: "K2VB", year: "2025 – Sekarang", cat: "Matic" },
            { name: "Honda Vario 160", code: "K2S", year: "2022 – Sekarang", cat: "Matic" },
            { name: "Honda PCX 160", code: "K1Z", year: "2021 – 2024", cat: "Matic" },
            { name: "Honda ADV 160", code: "K0WL", year: "2022 – Sekarang", cat: "Matic" },
            { name: "Honda Stylo 160", code: "K3V", year: "2024 – Sekarang", cat: "Matic" },
            // SPORT
            { name: "Honda Sonic 150R", code: "K56", year: "2015 – Sekarang", cat: "Sport" },
            { name: "Honda CB150R StreetFire", code: "K15P", year: "2021 – Sekarang", cat: "Sport" },
            { name: "Honda CBR 150R", code: "K45R", year: "2021 – Sekarang", cat: "Sport" },
            { name: "Honda CBR 250RR", code: "K64N", year: "2022 – Sekarang", cat: "Sport" },
            { name: "Honda CB150X", code: "K3BA", year: "2021 – Sekarang", cat: "Sport" },
            { name: "Honda CRF 150L", code: "K84F", year: "2018 – Sekarang", cat: "Sport" }
        ];

        let currentCat = 'all';

        function renderCatalog(filterText = '') {
            const grid = document.getElementById('catalogGrid');
            const noRes = document.getElementById('noResults');
            
            const filtered = motors.filter(m => {
                const matchCat = currentCat === 'all' || m.cat === currentCat;
                const matchSearch = m.name.toLowerCase().includes(filterText.toLowerCase()) || 
                                    m.code.toLowerCase().includes(filterText.toLowerCase());
                return matchCat && matchSearch;
            });

            grid.innerHTML = filtered.map(m => `
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-lg transition-all group">
                    <div class="p-5">
                        <div class="flex justify-between items-start mb-4">
                            <span class="text-xs font-bold uppercase tracking-wider text-red-500">${m.cat}</span>
                            <span class="bg-gray-100 text-gray-800 text-[10px] font-bold px-2 py-1 rounded">${m.code}</span>
                        </div>
                        <h3 class="font-bold text-lg text-gray-800 mb-1 group-hover:text-red-600 transition-colors">${m.name}</h3>
                        <p class="text-gray-500 text-xs mb-6"><i class="far fa-calendar-alt mr-1"></i> ${m.year}</p>
                        
                        <div class="space-y-2">
                            <button onclick="redirectToHonda('${m.code}')" 
                                class="w-full bg-red-600 hover:bg-red-700 text-white text-sm font-semibold py-2.5 rounded-lg transition-colors flex items-center justify-center gap-2">
                                <i class="fas fa-shopping-cart text-xs"></i> Cari Part & Harga
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');

            noRes.classList.toggle('hidden', filtered.length > 0);
        }

        function filterCategory(cat) {
            currentCat = cat;
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.classList.remove('bg-red-600', 'text-white', 'active');
                btn.classList.add('bg-gray-100', 'text-gray-600');
            });
            event.currentTarget.classList.add('bg-red-600', 'text-white', 'active');
            event.currentTarget.classList.remove('bg-gray-100', 'text-gray-600');
            renderCatalog(document.getElementById('searchInput').value);
        }

        function redirectToHonda(kode) {
            const url = `https://www.hondacengkareng.com/search-results/?q=${kode.toLowerCase()}&tab=products`;
            window.open(url, '_blank');
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            renderCatalog(e.target.value);
        });

        // Init
        renderCatalog();
    </script>
</body>
</html>
