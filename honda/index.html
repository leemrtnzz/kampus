const container = document.getElementById('motorContainer');
const searchInput = document.getElementById('searchInput');
const yearFilter = document.getElementById('yearFilter');
const resultCount = document.getElementById('resultCount');

function displayMotor(data) {
    container.innerHTML = '';
    resultCount.innerText = `${data.length} Motor`;
    
    data.forEach(item => {
        const card = `
            <div class="col">
                <div class="card h-100 motor-card" onclick="redirectToHonda('${item.kode}')">
                    <div class="card-body">
                        <h5 class="card-title">${item.nama}</h5>
                        <h6 class="card-subtitle mb-2 text-muted small">Tahun: ${item.tahun || 'N/A'}</h6>
                        <span class="badge badge-kode">Kode: ${item.kode}</span>
                    </div>
                    <div class="card-footer bg-transparent border-0">
                        <small class="text-primary">Klik untuk cari sparepart &rarr;</small>
                    </div>
                </div>
            </div>
        `;
        container.innerHTML += card;
    });
}

// Fungsi Redirect sesuai permintaan
function redirectToHonda(kode) {
    const url = `https://www.hondacengkareng.com/search-results/?q=${kode.toLowerCase()}&tab=products&page=1`;
    window.open(url, '_blank');
}

// Fungsi Filter & Search
function filterData() {
    const searchTerm = searchInput.value.toLowerCase();
    const selectedYear = yearFilter.value;

    const filtered = motorData.filter(item => {
        const matchSearch = item.nama.toLowerCase().includes(searchTerm) || 
                            item.kode.toLowerCase().includes(searchTerm);
        
        let matchYear = true;
        if (selectedYear === "Sekarang") matchYear = item.tahun?.includes("Sekarang");
        else if (selectedYear === "2024") matchYear = item.tahun?.includes("2024");
        else if (selectedYear === "2020") matchYear = item.tahun?.match(/202[0-3]/);
        else if (selectedYear === "2010") matchYear = item.tahun?.match(/201[0-9]/);
        else if (selectedYear === "2000") matchYear = item.tahun?.match(/19[0-9]{2}|200[0-9]/);

        return matchSearch && matchYear;
    });

    displayMotor(filtered);
}

searchInput.addEventListener('input', filterData);
yearFilter.addEventListener('change', filterData);

// Load awal
