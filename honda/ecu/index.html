
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTOTRONIC COMMUNITY</title>
    <style>
        :root {
            --bg-color: #1a1d21; --surface-color: #2c2f33; --text-color: #e0e0e0;
            --text-muted-color: #99aab5; --honda-red: #e3342f; --accent-blue: #00a8ff;
            --accent-yellow: #ffc107; --border-color: #424549; --success-color: #4caf50;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-color); line-height: 1.6; margin: 0; padding: 15px; }
        .container { max-width: 1200px; margin: auto; background: var(--surface-color); padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); }
        h1 { color: var(--honda-red); text-align: center; border-bottom: 2px solid var(--border-color); padding-bottom: 10px; margin-top: 0; font-size: 1.8em; }
        .controls { display: flex; justify-content: space-between; align-items: center; margin: 20px 0 10px 0; flex-wrap: wrap; gap: 10px; }
        .controls label { font-weight: bold; margin-right: 10px; }
        #model-select { padding: 8px 12px; font-size: 1em; border-radius: 5px; border: 1px solid var(--border-color); min-width: 300px; background-color: var(--bg-color); color: var(--text-color); flex-grow: 1; }
        .button-group button { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: background-color 0.2s; }
        .btn-add { background-color: var(--success-color); color: white; }
        .btn-edit { background-color: var(--accent-blue); color: white; }
        .btn-delete { background-color: var(--honda-red); color: white; }
        .button-group button:hover { opacity: 0.9; }
        
        /* <!-- BARU: Style untuk info kontributor --> */
        #model-attribution { text-align: left; font-size: 0.9em; color: var(--text-muted-color); margin: -5px 0 15px 5px; font-style: italic; }
        #model-attribution strong { color: var(--accent-yellow); }

        .main-content { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 15px; }
        .diagram-container { flex: 1; min-width: 350px; }
        #svg-wrapper { background-color: #23272a; padding: 20px; border-radius: 8px; border: 1px solid var(--border-color); min-height: 200px; display: flex; align-items: center; justify-content: center; }
        .pin { cursor: pointer; } .pin .pin-circle { fill: #4f545c; stroke: #72767d; }
        .pin.active .pin-circle { fill: var(--accent-blue); stroke: #fff; }
        .pin.selected .pin-circle { fill: var(--honda-red); stroke: #fff; }
        .pin .pin-text { font-size: 10px; fill: var(--text-muted-color); font-weight: bold; pointer-events: none; }
        #pin-info-box { background-color: #23272a; border: 1px solid var(--border-color); border-left: 5px solid var(--honda-red); border-radius: 8px; padding: 15px; margin-top: 20px; min-height: 100px; }
        #pin-info-box h3 { margin-top: 0; color: var(--honda-red); } #pin-info-box strong { color: var(--accent-yellow); }
        .table-container { flex: 1.5; min-width: 400px; max-height: 500px; overflow: auto; border: 1px solid var(--border-color); border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border-bottom: 1px solid var(--border-color); padding: 10px 12px; text-align: left; }
        th { background-color: #33363a; color: var(--honda-red); position: sticky; top: 0; }
        tbody tr { cursor: pointer; } tbody tr:hover { background-color: #40444b; }
        tbody tr.selected { background-color: #583c3c; font-weight: bold; }
        /* Modal Styles */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.7); }
        .modal-content { background-color: var(--surface-color); margin: 5% auto; padding: 25px; border: 1px solid var(--border-color); width: 80%; max-width: 700px; border-radius: 8px; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; margin-bottom: 20px; }
        .modal-header h2 { margin: 0; color: var(--honda-red); }
        .close-button { color: #aaa; font-size: 28px; font-weight: bold; cursor: pointer; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: var(--text-muted-color); }
        .form-group input, .form-group select { width: 100%; padding: 10px; background: var(--bg-color); border: 1px solid var(--border-color); color: var(--text-color); border-radius: 5px; box-sizing: border-box; }
        #pinout-fields-container { max-height: 250px; overflow-y: auto; padding: 10px; border: 1px solid var(--border-color); border-radius: 5px; margin-bottom: 15px; }
        .pin-entry { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        .pin-entry input { flex: 1; }
        .pin-entry .btn-remove-pin { background-color: #c0392b; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 3px; height: 30px; line-height: 20px; }
        .modal-footer { text-align: right; margin-top: 20px; }
        #loading-indicator { text-align: center; padding: 20px; font-style: italic; color: var(--text-muted-color); }
    </style>
</head>
<body oncontextmenu="return false;"> <!-- Cara lain blokir klik kanan -->

    <div class="container">
        <h1>DATA PINOUT ECM HONDA - AUTOTRONIC COMMUNITY</h1>

        <div class="controls">
            <div>
                <label for="model-select">Pilih Model:</label>
                <select id="model-select"></select>
            </div>
            <div class="button-group">
                <button id="add-model-btn" class="btn-add">+ Tambah</button>
                <button id="edit-model-btn" class="btn-edit">Edit</button>
                <button id="delete-model-btn" class="btn-delete">Hapus</button>
            </div>
        </div>

        <!-- BARU: Tempat untuk menampilkan nama kontributor -->
        <div id="model-attribution"></div>

        <div id="loading-indicator">Memuat data dari server...</div>

        <div class="main-content" style="display: none;">
            <div class="diagram-container">
                <div id="svg-wrapper"></div>
                <div id="pin-info-box">
                    <p class="placeholder">Pilih pin pada diagram atau tabel untuk melihat detail.</p>
                </div>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Pin</th>
                            <th>Warna Kabel</th>
                            <th>Keterangan / Fungsi</th>
                        </tr>
                    </thead>
                    <tbody id="pinout-table-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal Form -->
    <div id="model-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Tambah Model Baru</h2>
                <span class="close-button">&times;</span>
            </div>
            <form id="model-form">
                <input type="hidden" id="model-id">
                <div class="form-group">
                    <label for="model-name">Nama Model (contoh: Vario 160 K2S)</label>
                    <input type="text" id="model-name" required>
                </div>
                <div class="form-group">
                    <label for="model-category">Kategori</label>
                    <select id="model-category" required>
                        <option value="Matic">Matic</option>
                        <option value="Sport">Sport</option>
                        <option value="Bebek">Bebek</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="socket-type">Tipe Soket</label>
                    <select id="socket-type" required>
                        <option value="33pin">33 Pin</option>
                        <option value="39pin">39 Pin</option>
                    </select>
                </div>

                <!-- BARU: Field input untuk nama kontributor -->
                <div class="form-group">
                    <label for="model-contributor">Kontributor / Nama Anda</label>
                    <input type="text" id="model-contributor" required placeholder="Masukkan nama atau inisial Anda">
                </div>

                <hr>
                <h4>Data Pinout</h4>
                <div id="pinout-fields-container"></div>
                <button type="button" id="add-pin-btn" class="btn-add" style="margin-bottom: 20px;">+ Tambah Pin</button>
                
                <div class="modal-footer">
                    <button type="submit" class="btn-add">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
    document.addEventListener('DOMContentLoaded', () => {

        // --- PASTE KONFIGURASI FIREBASE ANDA DI SINI ---
        const firebaseConfig = {
			apiKey: "AIzaSyDYcSt_9pyeyL3Zy_-RtN-q0WXisxY7jxM",
			authDomain: "data-pinout-ecu.firebaseapp.com",
			projectId: "data-pinout-ecu",
			storageBucket: "data-pinout-ecu.firebasestorage.app",
			messagingSenderId: "841545435014",
			appId: "1:841545435014:web:493f060e73baa7f0e74e07",
			measurementId: "G-2PFDHEFTDL"
		};
        // ---------------------------------------------

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const modelsCollection = db.collection('models');

        // Elemen UI
        const modelSelect = document.getElementById('model-select');
        const modelAttribution = document.getElementById('model-attribution'); // DIUBAH
        const svgWrapper = document.getElementById('svg-wrapper');
        const tableBody = document.getElementById('pinout-table-body');
        const pinInfoBox = document.getElementById('pin-info-box');
        const loadingIndicator = document.getElementById('loading-indicator');
        const mainContent = document.querySelector('.main-content');
        const modal = document.getElementById('model-modal');
        const form = document.getElementById('model-form');
        
        // Blokir klik kanan
        document.addEventListener('contextmenu', event => event.preventDefault());

        let modelsData = [];
        let currentModel = null;

        // --- SVG TEMPLATES (Tidak berubah) ---
        const svgTemplate33Pin = `<svg viewBox="0 0 320 120" xmlns="http://www.w3.org/2000/svg"><rect x="5" y="5" width="310" height="90" rx="10" fill="#33363a" stroke="#555" stroke-width="2"/>${Array.from({length: 11}, (_, i) => `<g class="pin" data-pin="${i+1}"><circle class="pin-circle" cx="${25+i*27}" cy="25" r="8"/><text class="pin-text" x="${25+i*27}" y="28.5" text-anchor="middle">${i+1}</text></g>`).join('')}${Array.from({length: 11}, (_, i) => `<g class="pin" data-pin="${i+12}"><circle class="pin-circle" cx="${25+i*27}" cy="50" r="8"/><text class="pin-text" x="${25+i*27}" y="53.5" text-anchor="middle">${i+12}</text></g>`).join('')}${Array.from({length: 11}, (_, i) => `<g class="pin" data-pin="${i+23}"><circle class="pin-circle" cx="${25+i*27}" cy="75" r="8"/><text class="pin-text" x="${25+i*27}" y="78.5" text-anchor="middle">${i+23}</text></g>`).join('')}</svg>`;
        const svgTemplate39Pin = `<svg viewBox="0 0 350 120" xmlns="http://www.w3.org/2000/svg"><rect x="5" y="5" width="340" height="90" rx="10" fill="#33363a" stroke="#555" stroke-width="2"/>${Array.from({length: 13}, (_, i) => `<g class="pin" data-pin="${i+1}"><circle class="pin-circle" cx="${25+i*25}" cy="25" r="8"/><text class="pin-text" x="${25+i*25}" y="28.5" text-anchor="middle">${i+1}</text></g>`).join('')}${Array.from({length: 13}, (_, i) => `<g class="pin" data-pin="${i+14}"><circle class="pin-circle" cx="${25+i*25}" cy="50" r="8"/><text class="pin-text" x="${25+i*25}" y="53.5" text-anchor="middle">${i+14}</text></g>`).join('')}${Array.from({length: 13}, (_, i) => `<g class="pin" data-pin="${i+27}"><circle class="pin-circle" cx="${25+i*25}" cy="75" r="8"/><text class="pin-text" x="${25+i*25}" y="78.5" text-anchor="middle">${i+27}</text></g>`).join('')}</svg>`;

        // --- FUNGSI UTAMA ---
        async function loadModels() {
            loadingIndicator.style.display = 'block';
            mainContent.style.display = 'none';
            modelAttribution.innerHTML = ''; // DIUBAH
            try {
                const snapshot = await modelsCollection.orderBy('name').get();
                modelsData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                populateSelect();
                if (modelsData.length > 0) {
                    mainContent.style.display = 'flex';
                    updateDisplay(modelsData[0].id);
                } else {
                   pinInfoBox.innerHTML = '<p class="placeholder">Database kosong. Silakan tambah data model baru.</p>';
                }
            } catch (error) {
                console.error("Error loading models: ", error);
                alert("Gagal memuat data. Periksa koneksi internet atau konfigurasi Firebase.");
            } finally {
                loadingIndicator.style.display = 'none';
            }
        }

        function populateSelect() { /* Tidak berubah */
            modelSelect.innerHTML = '';
            const categories = {};
            modelsData.forEach(model => {
                if (!categories[model.category]) categories[model.category] = [];
                categories[model.category].push(model);
            });
            for (const category in categories) {
                const optgroup = document.createElement('optgroup');
                optgroup.label = `--- ${category} ---`;
                categories[category].forEach(model => {
                    const option = document.createElement('option');
                    option.value = model.id;
                    option.textContent = model.name;
                    optgroup.appendChild(option);
                });
                modelSelect.appendChild(optgroup);
            }
        }

        function updateDisplay(modelId) {
            currentModel = modelsData.find(m => m.id === modelId);
            if (!currentModel) return;

            modelSelect.value = modelId;

            // DIUBAH: Tampilkan nama kontributor
            modelAttribution.innerHTML = `Kontribusi dari: <strong>${currentModel.contributor || 'Anonim'}</strong>`;

            svgWrapper.innerHTML = currentModel.socketType === '39pin' ? svgTemplate39Pin : svgTemplate33Pin;
            updateTable(currentModel.pinout || []);
            activateSvgPins(currentModel.pinout || []);
            clearSelection();
            addSvgAndTableListeners();
        }
        
        function updateTable(pinoutData) { /* Tidak berubah */
            tableBody.innerHTML = '';
            pinoutData.sort((a,b) => parseInt(a.pin) - parseInt(b.pin)).forEach(pin => {
                const row = document.createElement('tr');
                row.dataset.pin = pin.pin;
                row.innerHTML = `<td>${pin.pin}</td><td>${pin.color}</td><td>${pin.description}</td>`;
                tableBody.appendChild(row);
            });
        }

        function activateSvgPins(pinoutData) { /* Tidak berubah */
            const activePins = new Set(pinoutData.map(p => p.pin));
            svgWrapper.querySelectorAll('.pin').forEach(p => {
                p.classList.toggle('active', activePins.has(p.dataset.pin));
            });
        }
        
        function selectPin(pinNumber) { /* Tidak berubah */
            clearSelection();
            const pinData = currentModel.pinout.find(p => p.pin == pinNumber);
            if (!pinData) return;
            const svgPin = svgWrapper.querySelector(`.pin[data-pin="${pinNumber}"]`);
            if (svgPin) svgPin.classList.add('selected');
            const tableRow = tableBody.querySelector(`tr[data-pin="${pinNumber}"]`);
            if (tableRow) {
                tableRow.classList.add('selected');
                tableRow.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
            pinInfoBox.innerHTML = `<h3>Pin ${pinNumber}</h3><p><strong>Warna Kabel:</strong> ${pinData.color}</p><p><strong>Fungsi:</strong> ${pinData.description}</p>`;
        }

        function clearSelection() { /* Tidak berubah */
            svgWrapper.querySelectorAll('.selected').forEach(el => el.classList.remove('selected'));
            tableBody.querySelectorAll('.selected').forEach(el => el.classList.remove('selected'));
            pinInfoBox.innerHTML = '<p class="placeholder">Pilih pin pada diagram atau tabel untuk melihat detail.</p>';
        }

        // --- FUNGSI MODAL & CRUD ---

        function openModal(mode, model = null) { // DIUBAH
            form.reset();
            document.getElementById('model-id').value = '';
            document.getElementById('pinout-fields-container').innerHTML = '';
            
            if (mode === 'edit' && model) {
                document.getElementById('modal-title').textContent = 'Edit Model';
                document.getElementById('model-id').value = model.id;
                document.getElementById('model-name').value = model.name;
                document.getElementById('model-category').value = model.category;
                document.getElementById('socket-type').value = model.socketType;
                document.getElementById('model-contributor').value = model.contributor || ''; // <-- Isi field kontributor
                (model.pinout || []).forEach(pinData => addPinField(pinData));
            } else {
                document.getElementById('modal-title').textContent = 'Tambah Model Baru';
                // Otomatis isi nama kontributor terakhir dari localStorage
                document.getElementById('model-contributor').value = localStorage.getItem('pinoutLastContributor') || '';
                addPinField(); 
            }
            modal.style.display = 'block';
        }

        function addPinField(data = { pin: '', color: '', description: '' }) { /* Tidak berubah */
            const container = document.getElementById('pinout-fields-container');
            const div = document.createElement('div');
            div.className = 'pin-entry';
            div.innerHTML = `
                <input type="text" placeholder="No. Pin" value="${data.pin}" class="pin-field-pin" size="5">
                <input type="text" placeholder="Warna Kabel" value="${data.color}" class="pin-field-color">
                <input type="text" placeholder="Fungsi" value="${data.description}" class="pin-field-desc">
                <button type="button" class="btn-remove-pin">&times;</button>
            `;
            container.appendChild(div);
            div.querySelector('.btn-remove-pin').onclick = () => div.remove();
        }

        async function handleFormSubmit(e) { // DIUBAH
            e.preventDefault();
            const id = document.getElementById('model-id').value;
            const contributorName = document.getElementById('model-contributor').value.trim();

            if (!contributorName) {
                alert('Nama kontributor tidak boleh kosong.');
                return;
            }

            const pinout = [];
            document.querySelectorAll('.pin-entry').forEach(entry => {
                const pin = entry.querySelector('.pin-field-pin').value.trim();
                const color = entry.querySelector('.pin-field-color').value.trim();
                const desc = entry.querySelector('.pin-field-desc').value.trim();
                if (pin && color && desc) {
                    pinout.push({ pin, color, description: desc });
                }
            });

            const modelData = {
                name: document.getElementById('model-name').value,
                category: document.getElementById('model-category').value,
                socketType: document.getElementById('socket-type').value,
                contributor: contributorName, // <-- Tambahkan data kontributor
                pinout: pinout
            };

            try {
                if (id) { // Edit mode
                    await modelsCollection.doc(id).update(modelData);
                    alert('Model berhasil diperbarui!');
                } else { // Add mode
                    modelData.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                    await modelsCollection.add(modelData);
                    alert('Model berhasil ditambahkan!');
                }
                
                // Simpan nama kontributor terakhir untuk digunakan lagi nanti
                localStorage.setItem('pinoutLastContributor', contributorName);

                modal.style.display = 'none';
                loadModels();
            } catch (error) {
                console.error("Error saving model: ", error);
                alert('Gagal menyimpan data. Coba lagi.');
            }
        }

        async function deleteModel() { /* Tidak berubah */
            if (!currentModel) {
                alert('Pilih model yang akan dihapus.');
                return;
            }
            if (confirm(`Anda yakin ingin menghapus "${currentModel.name}"? Tindakan ini tidak bisa dibatalkan.`)) {
                try {
                    await modelsCollection.doc(currentModel.id).delete();
                    alert('Model berhasil dihapus.');
                    loadModels();
                } catch (error) {
                    console.error("Error deleting model: ", error);
                    alert('Gagal menghapus data.');
                }
            }
        }
        
        // --- EVENT LISTENERS (Tidak berubah) ---
        function addSvgAndTableListeners() {
            svgWrapper.onclick = (e) => {
                const pinElement = e.target.closest('.pin.active');
                if (pinElement) selectPin(pinElement.dataset.pin);
            };
            tableBody.onclick = (e) => {
                const rowElement = e.target.closest('tr');
                if (rowElement) selectPin(rowElement.dataset.pin);
            };
        }
        modelSelect.addEventListener('change', (e) => updateDisplay(e.target.value));
        document.getElementById('add-model-btn').addEventListener('click', () => openModal('add'));
        document.getElementById('edit-model-btn').addEventListener('click', () => {
            if(currentModel) openModal('edit', currentModel); else alert('Pilih model untuk diedit.');
        });
        document.getElementById('delete-model-btn').addEventListener('click', deleteModel);
        document.querySelector('.close-button').onclick = () => modal.style.display = 'none';
        window.onclick = (e) => { if (e.target == modal) modal.style.display = 'none'; };
        document.getElementById('add-pin-btn').addEventListener('click', () => addPinField());
        form.addEventListener('submit', handleFormSubmit);

        // --- Inisialisasi ---
        loadModels();
    });
    </script>

</body>
</html>
