          Ichsan Store

          Daftar Harga Layanan & Produk Digital
        </p>
      </div>

      <div class="mb-6 relative">
        <div
          class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"
        >
          <svg
            class="w-5 h-5 text-slate-400"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
            ></path>

        </div>
        <input
          type="text"
          id="searchInput"
          placeholder="Cari nama produk atau variant..."
          class="w-full pl-11 pr-4 py-3 bg-white border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-slate-800 focus:border-transparent transition-all shadow-sm"
        />
      </div>

      <div
        class="bg-white rounded-2xl shadow-xl shadow-slate-200/50 overflow-hidden border border-slate-200"
      >
        <div class="overflow-x-auto">
          <table class="w-full text-left border-collapse">
            <thead>
              <tr
                class="bg-slate-900 text-white text-xs md:text-sm uppercase tracking-wider"
              >
                <th class="px-6 py-5 font-semibold rounded-tl-2xl">Produk</th>
                <th class="px-6 py-5 font-semibold">Variant</th>
                <th class="px-6 py-5 font-semibold text-right">Harga Modal</th>
                <th class="px-6 py-5 font-semibold text-right">
                  Harga Jual (rekomendasi)
                </th>
                <th class="px-6 py-5 font-semibold text-right rounded-tr-2xl">
                  Keuntungan (Laba)
                </th>
              </tr>
            </thead>

            <tbody
              id="product-table-body"
              class="divide-y divide-slate-100"
            ></tbody>
          </table>
        </div>
      </div>

      <div class="mt-6 text-center text-xs text-slate-400">
        <p>&copy; 2026 Ichsan Store. Harga dapat berubah sewaktu-waktu.</p>
      </div>
    </div>

        { nama: "Zoom", variant: "14 Hari", harga: 4000, markup: 10000 },

      // 2. Format Rupiah
      const formatRupiah = (angka) => {
        return new Intl.NumberFormat("id-ID", {
          style: "currency",
          currency: "IDR",
          minimumFractionDigits: 0,
        }).format(angka);
      };

      // 3. Tangkap Elemen DOM
      const tableBody = document.getElementById("product-table-body");
      const searchInput = document.getElementById("searchInput");

      // 4. Fungsi untuk me-render tabel
      const renderTable = (data) => {
        let htmlContent = "";

        if (data.length === 0) {
          tableBody.innerHTML = `
            <tr>
              <td colspan="5" class="px-6 py-8 text-center text-slate-500">
                Produk tidak ditemukan.
              </td>
            </tr>
          `;
          return;
        }

        data.forEach((produk) => {
          const inisial = produk.nama.charAt(0).toUpperCase();
          // Hitung Laba secara dinamis
          const laba = produk.markup - produk.harga;

          htmlContent += `
            <tr class="odd:bg-white even:bg-slate-50 hover:bg-slate-100 transition-colors duration-200 group">
              <td class="px-6 py-4 whitespace-nowrap">
                <div class="flex items-center gap-4">
                  <div class="w-10 h-10 rounded-full bg-slate-800 text-white flex items-center justify-center font-bold text-lg group-hover:scale-110 transition-transform">
                    ${inisial}
                  </div>
                  <span class="font-semibold text-slate-900 text-base">${produk.nama}</span>
                </div>
              </td>
              <td class="px-6 py-4 whitespace-nowrap">
                <span class="inline-flex items-center px-3 py-1 rounded-full text-md font-medium bg-slate-100 text-slate-700 border border-slate-200">
                  ${produk.variant}
                </span>
              </td>
              <td class="px-6 py-4 whitespace-nowrap text-right">
                <span class="text-slate-500 text-base">${formatRupiah(produk.harga)}</span>
              </td>
              <td class="px-6 py-4 whitespace-nowrap text-right">
                <span class="font-bold text-slate-800 text-base">${formatRupiah(produk.markup)}</span>
              </td>
              <td class="px-6 py-4 whitespace-nowrap text-right">
                <span class="font-bold text-emerald-600 text-base md:text-lg">${formatRupiah(laba)}</span>
              </td>
            </tr>
          `;
        });

        tableBody.innerHTML = htmlContent;
      };

      // 5. Render pertama kali
      renderTable(dataProduk);

      // 6. Fitur Search
      searchInput.addEventListener("input", (e) => {
        const kataKunci = e.target.value.toLowerCase();
        const dataDisaring = dataProduk.filter((produk) => {
          return (
            produk.nama.toLowerCase().includes(kataKunci) ||
            produk.variant.toLowerCase().includes(kataKunci)
          );
        });
        renderTable(dataDisaring);
      });
    </script>
  </body>
</html>
